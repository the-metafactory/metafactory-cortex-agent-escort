# agents-md.yaml — repo-specific config for CLAUDE.md generation from the
# compass ecosystem template (see compass/metafactory/sops/new-repo.md step 7).
# `arc upgrade compass` regenerates CLAUDE.md from the template + the section
# files below.
template: compass-standards
generate:
  - format: claude-md
repo_name: metafactory-cortex-agent-escort
repo_description: "Escort — a cortex onboarding greeter with a closed effect universe, shipped as the canonical sample of how a cortex agent is bundled and delivered on meta-factory.ai. Deterministic by default at the anonymous edge, stack-managed hybrid voice by opt-in (compose, cortex#2257). Exec brain, surfaces to a human, never grants."
deploy_command: "arc upgrade metafactory-cortex-agent-escort"
version_source: arc-manifest.yaml
sections:
  - position: "after:description"
    file: docs/agents-md/architecture.md
  - position: "after:critical-rules"
    file: docs/agents-md/critical-rules.md
